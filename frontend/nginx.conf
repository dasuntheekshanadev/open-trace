server {
    listen 80;

    # Serve the React app
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy collector API endpoints — avoids hardcoding localhost in the built JS
    location /graph {
        proxy_pass http://collector:4319;
    }

    location /anomalies {
        proxy_pass http://collector:4319;
    }

    location /rootcause {
        proxy_pass http://collector:4319;
    }

    location /timeseries {
        proxy_pass http://collector:4319;
    }
}
